<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Eye YOLO PRO</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>
body { margin:0; background:#0f172a; color:white; font-family:sans-serif; }
video { width:100%; }
canvas { position:absolute; top:0; left:0; }
.controls { padding:10px; display:flex; gap:10px; }
button { padding:10px; border-radius:10px; border:none; }
</style>
</head>

<body>

<div style="position:relative">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<canvas id="processCanvas" style="display:none"></canvas>

<div class="controls">
<button id="startBtn">▶️ Старт</button>
<button id="stopBtn">⏹️ Стоп</button>
<button id="switchBtn">🔄 Камера</button>
<button id="exportBtn">💾 Экспорт</button>
</div>

<script>
const state = {
  video:null,
  canvas:null,
  ctx:null,
  overlay:null,
  octx:null,

  stream:null,
  facingMode:"environment",

  session:null,

  running:false,
  history:[],
  startTime:0,

  prevCenters:new Map()
};

// ===== INIT =====
async function init(){
  state.video = document.getElementById("video");
  state.canvas = document.getElementById("processCanvas");
  state.ctx = state.canvas.getContext("2d");

  state.overlay = document.getElementById("overlay");
  state.octx = state.overlay.getContext("2d");

  resize();
  window.addEventListener("resize", resize);

  await loadModel();
  await startCamera();

  loop();
}

// ===== MODEL =====
async function loadModel(){
  state.session = await ort.InferenceSession.create("./models/yolov8n.onnx");
  console.log("YOLO loaded");
}

// ===== CAMERA =====
async function startCamera(){
  if(state.stream){
    state.stream.getTracks().forEach(t=>t.stop());
  }

  state.stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: state.facingMode }
  });

  state.video.srcObject = state.stream;
}

// ===== LOOP =====
async function loop(){
  if(state.running){
    await process();
  }
  requestAnimationFrame(loop);
}

// ===== PROCESS =====
async function process(){
  const w = 416, h = 320;
  state.canvas.width = w;
  state.canvas.height = h;

  state.ctx.drawImage(state.video,0,0,w,h);

  const input = preprocess();

  const output = await state.session.run({images:input});
  const boxes = postprocess(output);

  draw(boxes);
  computeAttention(boxes);
}

// ===== PREPROCESS =====
function preprocess(){
  const img = state.ctx.getImageData(0,0,state.canvas.width,state.canvas.height);
  const data = img.data;

  const float = new Float32Array(3img.widthimg.height);

  for(let i=0;i<img.widthimg.height;i++){
    float[i] = data[i4]/255;
    float[i+img.widthimg.height] = data[i4+1]/255;
    float[i+2img.widthimg.height] = data[i4+2]/255;
  }

  return new ort.Tensor("float32", float, [1,3,img.height,img.width]);
}

// ===== POSTPROCESS YOLO =====
function postprocess(output){
  const out = output.output0.data;
  const boxes = [];

  const num = out.length / 85;

  for(let i=0;i<num;i++){
    const offset = i85;

    const x = out[offset];
    const y = out[offset+1];
    const w = out[offset+2];
    const h = out[offset+3];
    const obj = out[offset+4];

    let maxClass=0;
    let maxScore=0;

    for(let c=5;c<85;c++){
      if(out[offset+c]>maxScore){
        maxScore = out[offset+c];
        maxClass = c-5;
      }
    }

    const score = obj * maxScore;

    // class 0 = person
    if(score>0.4 && maxClass===0){
      boxes.push({x,y,w,h,score});
    }
  }

  return nms(boxes,0.5);
}

// ===== NMS =====
function nms(boxes, iouThresh){
  boxes.sort((a,b)=>b.score-a.score);
  const result=[];

  for(let i=0;i<boxes.length;i++){
    let keep=true;

    for(let j=0;j<result.length;j++){
      if(iou(boxes[i],result[j])>iouThresh){
        keep=false;
        break;
      }
    }

    if(keep) result.push(boxes[i]);
  }

  return result;
}

function iou(a,b){
  const x1 = Math.max(a.x-a.w/2, b.x-b.w/2);
  const y1 = Math.max(a.y-a.h/2, b.y-b.h/2);
  const x2 = Math.min(a.x+a.w/2, b.x+b.w/2);
  const y2 = Math.min(a.y+a.h/2, b.y+b.h/2);

  const inter = Math.max(0,x2-x1)Math.max(0,y2-y1);
  const union = a.wa.h + b.wb.h - inter;

  return inter/union;
}

// ===== HEAD HEURISTIC =====
function isLooking(box, index){
  const centerY = box.y;

  // если голова сильно вниз → низкий центр
  const looking = centerY < 0.6;

  // стабильность по движению
  const prev = state.prevCenters.get(index);
  state.prevCenters.set(index, centerY);

  if(prev){
    const diff = Math.abs(prev-centerY);
    if(diff > 0.1) return false;
  }

  return looking;
}

// ===== DRAW =====
function draw(boxes){
  const ctx = state.octx;
  const w = state.overlay.width;
  const h = state.overlay.height;

  ctx.clearRect(0,0,w,h);

  boxes.forEach((b,i)=>{
    const x = (b.x - b.w/2) * w;
    const y = (b.y - b.h/2) * h;
    const bw = b.w * w;
    const bh = b.h * h;

    const engaged = isLooking(b,i);

    ctx.strokeStyle = engaged ? "lime" : "red";
    ctx.strokeRect(x,y,bw,bh);
  });
}

// ===== ATTENTION =====
function computeAttention(boxes){
  let total=0, engaged=0;

  boxes.forEach((b,i)=>{
    const area = b.wb.h;
    const weight = Math.sqrt(area);

    total += weight;
    if(isLooking(b,i)) engaged += weight;
  });

  const score = total ? (engaged/total)*100 : 0;

  state.history.push(score);
}

// ===== EXPORT =====
function exportReport(){
  const avg = state.history.reduce((a,b)=>a+b,0)/state.history.length;

  const report = {
    duration: Math.floor((Date.now()-state.startTime)/1000),
    avg,
    peak: Math.max(...state.history)
  };

  const blob = new Blob([JSON.stringify(report,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "report.json";
  a.click();
}

// ===== UI =====
document.getElementById("startBtn").onclick=()=>{
  state.running=true;
  state.startTime=Date.now();
};

document.getElementById("stopBtn").onclick=()=>{
  state.running=false;
};

document.getElementById("switchBtn").onclick=async()=>{
  state.facingMode = state.facingMode==="user"?"environment":"user";
  await startCamera();
};

document.getElementById("exportBtn").onclick=exportReport;

// ===== RESIZE =====
function resize(){
  const v = state.video;
  state.overlay.width = v.clientWidth;
  state.overlay.height = v.clientHeight;
}

init();
</script>

</body>
</htm
