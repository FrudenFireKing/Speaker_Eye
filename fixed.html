<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Speaker Eye AI v2</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif}
video{width:100%;background:#000}
canvas{position:absolute;top:0;left:0;pointer-events:none}
.wrap{position:relative}
.panel{padding:12px}
.big{font-size:46px;text-align:center;font-weight:800}
.bar{height:10px;background:#1e293b;border-radius:8px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e)}
button{padding:10px;margin:4px;border:none;border-radius:10px;background:#6366f1;color:#fff;font-weight:600}
</style>
</head>

<body>

<div class="wrap">
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div class="panel">

<div class="big" id="score">0</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<button id="start">Start AI</button>
<button id="switch">Switch Camera</button>

</div>

<script>
const state = {
video:null,
stream:null,
model:null,
running:false,
facing:"user",
score:0,
history:[]
};

// CAMERA
async function startCamera(){
if(state.stream){
state.stream.getTracks().forEach(t=>t.stop());
}

state.stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:state.facing}
});

state.video.srcObject = state.stream;
await state.video.play();
}

// LOAD AI
async function loadAI(){
state.model = await cocoSsd.load();
console.log("AI READY");
}

// ATTENTION MODEL
function computeAttention(preds){

let people = 0;
let engaged = 0;

preds.forEach(p=>{
if(p.class==="person"){
people++;

const area = p.bbox[2]*p.bbox[3];
const normalized = area / (640480);

// closer = more engaged
if(normalized > 0.08){
engaged++;
}
}
});

if(people===0) return 30;

return (engaged/people)*100;
}

// LOOP
async function loop(){
if(state.running && state.model){

const preds = await state.model.detect(state.video);

const score = computeAttention(preds);

state.score = score;
state.history.push(score);

// UI
document.getElementById("score").textContent = score.toFixed(0);
document.getElementById("fill").style.width = score+"%";

draw(preds);
}

requestAnimationFrame(loop);
}

// DRAW BOXES
function draw(preds){
const c = document.getElementById("overlay");
const ctx = c.getContext("2d");

c.width = state.video.clientWidth;
c.height = state.video.clientHeight;

ctx.clearRect(0,0,c.width,c.height);

preds.forEach(p=>{
if(p.class==="person"){
ctx.strokeStyle="lime";
ctx.strokeRect(...p.bbox);
}
});
}

// START
start.onclick = async ()=>{
await startCamera();
await loadAI();

state.running = true;
};

// SWITCH CAMERA
switch.onclick = async ()=>{
state.facing = state.facing==="user"?"environment":"user";
await startCamera();
};

loop();
</script>

</body>
</html>
