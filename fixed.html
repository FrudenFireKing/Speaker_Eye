<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speaker Eye - Working Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .header h1 { font-size: 22px; }
        
        .camera-container { position: relative; width: 100%; height: 35vh; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        
        .big-number { text-align: center; margin: 20px; }
        .attention-value { font-size: 120px; font-weight: bold; line-height: 1; }
        .good { color: #4ade80; text-shadow: 0 0 20px rgba(74,222,128,0.5); }
        .medium { color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.5); }
        .bad { color: #f87171; text-shadow: 0 0 20px rgba(248,113,113,0.5); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 15px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 11px; opacity: 0.7; margin-top: 5px; }
        
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 10px; height: 6px; margin: 20px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.2s ease; }
        
        .status { text-align: center; padding: 10px; font-size: 12px; }
        .debug { text-align: center; font-size: 10px; color: #aaa; margin: 5px; font-family: monospace; }
        
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; margin: 10px 20px; width: calc(100% - 40px); cursor: pointer; }
        input { width: calc(100% - 40px); padding: 12px 20px; margin: 10px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.1); color: white; font-size: 14px; }
        
        .footer { text-align: center; padding: 15px; font-size: 10px; opacity: 0.5; }
        .camera-hint { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 8px; margin: 10px; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎤 Speaker Eye</h1>
        <p>Audience Attention Tracker</p>
    </div>
    
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="overlay">
            <div class="big-number">
                <div style="font-size: 14px;">ATTENTION</div>
                <div class="attention-value" id="attention">--</div>
                <div style="font-size: 14px;">%</div>
            </div>
        </div>
    </div>
    
    <div class="camera-hint" id="cameraHint">
        📱 Using front camera (for demo)
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="faces">0</div>
            <div class="stat-label">Faces</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="looking">0</div>
            <div class="stat-label">Looking</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="fps">0</div>
            <div class="stat-label">FPS</div>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
    </div>
    
    <div class="status" id="status">Loading AI model...</div>
    <div class="debug" id="debug">Initializing</div>
    
    <input type="email" id="email" placeholder="Email for report">
    <button id="sendReportBtn">📧 Send Report</button>
    
    <div class="footer">
        Using front camera • In App Store version: rear camera for audience
    </div>

    <script>
        // ============================================
        // РАБОЧАЯ ВЕРСИЯ С ФРОНТАЛЬНОЙ КАМЕРОЙ
        // Для презентации и демонстрации алгоритма
        // ============================================
        
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        
        let faceDetection = null;
        let isModelReady = false;
        let lastTime = 0;
        let fps = 0;
        let cameraStream = null;
        let mediaPipeCamera = null;
        
        let totalFaces = 0;
        let lookingFaces = 0;
        let currentAttention = 50;
        
        let sessionStart = Date.now();
        let attentionHistory = [];
        
        // Загрузка MediaPipe Face Detection
        async function loadMediaPipe() {
            const debug = document.getElementById('debug');
            const status = document.getElementById('status');
            
            status.innerHTML = '📥 Loading AI model (25MB)...';
            debug.innerHTML = 'Downloading face detection model...';
            
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js');
            await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js');
            
            debug.innerHTML = 'Models loaded, initializing...';
            
            faceDetection = new FaceDetection({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
            });
            
            faceDetection.setOptions({
                model: 'short',
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            faceDetection.onResults(onFaceResults);
            
            status.innerHTML = '✅ Model ready!';
            debug.innerHTML = 'Face detection active';
            isModelReady = true;
            
            return true;
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        function onFaceResults(results) {
            if (!results.detections) {
                totalFaces = 0;
                lookingFaces = 0;
                currentAttention = 25;
                updateUI();
                return;
            }
            
            const faces = results.detections;
            totalFaces = faces.length;
            
            let lookingCount = 0;
            for (const face of faces) {
                const bbox = face.boundingBox;
                if (bbox && bbox.relativeVertices) {
                    const centerY = (bbox.relativeVertices[0].y + bbox.relativeVertices[2].y) / 2;
                    const width = bbox.width;
                    
                    if (centerY < 0.55 && width > 0.08) {
                        lookingCount++;
                    } else if (width > 0.15) {
                        lookingCount++;
                    }
                }
            }
            
            lookingFaces = lookingCount;
            
            if (totalFaces > 0) {
                let rawAttention = (lookingFaces / totalFaces) * 100;
                currentAttention = Math.min(95, Math.max(30, rawAttention + 15));
            } else {
                currentAttention = 30;
            }
            
            updateUI();
            
            attentionHistory.push(currentAttention);
            if (attentionHistory.length > 600) attentionHistory.shift();
        }
        
        function updateUI() {
            const attentionEl = document.getElementById('attention');
            const progressFill = document.getElementById('progressFill');
            const displayAttention = Math.round(currentAttention);
            
            attentionEl.textContent = displayAttention;
            
            if (displayAttention > 70) {
                attentionEl.className = 'attention-value good';
                progressFill.style.background = '#4ade80';
                document.getElementById('status').innerHTML = '🔥 High engagement!';
            } else if (displayAttention > 45) {
                attentionEl.className = 'attention-value medium';
                progressFill.style.background = '#fbbf24';
                document.getElementById('status').innerHTML = '👍 Good engagement';
            } else {
                attentionEl.className = 'attention-value bad';
                progressFill.style.background = '#f87171';
                document.getElementById('status').innerHTML = '⚠️ Low attention';
            }
            
            progressFill.style.width = displayAttention + '%';
            
            document.getElementById('faces').textContent = totalFaces;
            document.getElementById('looking').textContent = lookingFaces;
        }
        
        // Запуск камеры - ФРОНТАЛЬНАЯ (работает везде)
        async function startCamera() {
            const debug = document.getElementById('debug');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                cameraStream = stream;
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = resolve; });
                await video.play();
                
                const track = stream.getVideoTracks()[0];
                debug.innerHTML = `✅ Camera: ${track.label}`;
                
                mediaPipeCamera = new Camera(video, {
                    onFrame: async () => {
                        if (isModelReady && faceDetection) {
                            await faceDetection.send({image: video});
                        }
                    },
                    width: 640,
                    height: 480
                });
                
                await mediaPipeCamera.start();
                
                debug.innerHTML = '✅ System ready! Point camera at people';
                
            } catch (err) {
                debug.innerHTML = 'Camera error: ' + err.message;
            }
        }
        
        // FPS счетчик
        function startFpsCounter() {
            setInterval(() => {
                const now = performance.now();
                if (lastTime > 0) {
                    const delta = now - lastTime;
                    fps = Math.round(1000 / delta);
                    document.getElementById('fps').textContent = Math.min(30, fps);
                }
                lastTime = now;
            }, 1000);
        }
        
        // Отправка отчета
        function sendReport() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter email address');
                return;
            }
            
            const avgAttention = attentionHistory.length > 0 
                ? attentionHistory.reduce((a,b) => a+b, 0) / attentionHistory.length 
                : 50;
            const duration = Math.round((Date.now() - sessionStart) / 1000);
            
            const report = {
                email: email,
                session: {
                    duration: duration,
                    avg_attention: Math.round(avgAttention),
                    max_attention: Math.round(Math.max(...attentionHistory, 50)),
                    min_attention: Math.round(Math.min(...attentionHistory, 30)),
                    timestamp: new Date().toISOString()
                }
            };
            
            const blob = new Blob([JSON.stringify(report, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `speaker_eye_${Date.now()}.json`;
            a.click();
            
            document.getElementById('status').innerHTML = '✅ Report saved';
            setTimeout(() => {
                document.getElementById('status').innerHTML = '🎤 Ready';
            }, 2000);
        }
        
        // Запуск
        async function init() {
            await loadMediaPipe();
            await startCamera();
            startFpsCounter();
        }
        
        init();
        
        document.getElementById('sendReportBtn').onclick = sendReport;
    </script>
</body>
</html>
