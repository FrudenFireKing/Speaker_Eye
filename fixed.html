<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaker Eye - Quick</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #1a1a2e; color: white; }
        .attention { font-size: 120px; font-weight: bold; margin: 50px; }
        button { padding: 15px 30px; font-size: 18px; background: #667eea; color: white; border: none; border-radius: 10px; margin: 20px; }
        .good { color: #4ade80; }
        .medium { color: #fbbf24; }
        .bad { color: #f87171; }
    </style>
</head>
<body>
    <h1>🎤 Speaker Eye</h1>
    <div class="attention" id="attention">--%</div>
    <button id="startBtn">📷 Start Camera</button>
    <button id="demoBtn">🎮 Demo Mode</button>
    <div id="status"></div>

    <script>
        let stream = null;
        let attentionInterval = null;
        
        // Симуляция внимания для демо
        function startDemo() {
            if (attentionInterval) clearInterval(attentionInterval);
            attentionInterval = setInterval(() => {
                const randomAttention = Math.floor(Math.random() * 60) + 30;
                updateUI(randomAttention);
            }, 2000);
            document.getElementById('status').innerHTML = 'Demo mode active - simulating audience attention';
        }
        
        function updateUI(attention) {
            const el = document.getElementById('attention');
            el.textContent = attention + '%';
            el.className = 'attention';
            if (attention > 70) el.classList.add('good');
            else if (attention > 45) el.classList.add('medium');
            else el.classList.add('bad');
        }
        
        document.getElementById('demoBtn').onclick = startDemo;
        
        document.getElementById('startBtn').onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('status').innerHTML = '✅ Camera ready! Analyzing audience...';
                
                // Симуляция анализа (в реальной версии здесь будет детекция)
                startDemo();
            } catch(err) {
                document.getElementById('status').innerHTML = '❌ Camera error: ' + err.message;
            }
        };
    </script>
</body>
</html>
