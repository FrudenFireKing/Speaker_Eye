<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speaker Eye - Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .header { 
            text-align: center; 
            padding: 12px 15px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .header h1 { font-size: 18px; }
        .header p { font-size: 11px; opacity: 0.9; }
        
        .camera-container { 
            position: relative; 
            width: 100%; 
            height: 45vh; 
            background: #000; 
            overflow: hidden;
            border: 2px solid #333;
        }
        #video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        #debugCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .attention-display {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            margin: 10px;
            border-radius: 12px;
        }
        .attention-value { 
            font-size: 64px; 
            font-weight: 800; 
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .good { color: #4ade80; }
        .medium { color: #fbbf24; }
        .bad { color: #f87171; }
        .unknown { color: #6b7280; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 10px 10px;
        }
        .stat {
            background: rgba(255,255,255,0.08);
            padding: 10px 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
        }
        .stat-value { font-size: 20px; font-weight: 700; }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            margin: 0 15px 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            transition: width 0.2s;
            background: #667eea;
        }
        
        .status {
            text-align: center;
            padding: 8px 15px;
            font-size: 12px;
            background: rgba(102,126,234,0.15);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #fbbf24;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
        .status-dot.ready { background: #4ade80; animation: none; }
        .status-dot.error { background: #f87171; animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        
        .debug-log {
            max-height: 120px;
            overflow-y: auto;
            padding: 10px 15px;
            font-size: 10px;
            font-family: monospace;
            color: #aaa;
            background: rgba(0,0,0,0.3);
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .controls { padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px;
            border-radius: 12px; font-size: 13px; font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.test { background: linear-gradient(135deg, #10b981, #059669); }
        button.camera { background: linear-gradient(135deg, #f59e0b, #d97706); }
        
        input {
            padding: 12px 15px; border: none; border-radius: 12px;
            background: rgba(255,255,255,0.12); color: white;
            font-size: 13px; outline: none;
        }
        
        .mode-select {
            display: flex; gap: 5px; padding: 0 15px 10px;
        }
        .mode-btn {
            flex: 1; padding: 8px; border-radius: 8px;
            background: rgba(255,255,255,0.1); border: 2px solid transparent;
            color: white; font-size: 11px; cursor: pointer;
        }
        .mode-btn.active {
            background: rgba(102,126,234,0.3);
            border-color: #667eea;
        }
        
        .footer {
            text-align: center; padding: 12px;
            font-size: 10px; opacity: 0.5;
        }
        
        /* Debug overlay on video */
        .video-overlay {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 10;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎤 Speaker Eye DEBUG</h1>
        <p>Face Detection Test Mode</p>
    </div>
    
    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <canvas id="debugCanvas"></canvas>
        <div class="video-overlay" id="videoOverlay">Waiting for camera...</div>
    </div>
    
    <div class="attention-display">
        <div style="font-size:12px;opacity:0.8">ATTENTION SCORE</div>
        <div class="attention-value unknown" id="attention">--</div>
        <div style="font-size:12px;opacity:0.8">%</div>
    </div>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="faces">0</div>
            <div>Faces</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="looking">0</div>
            <div>Looking</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="fps">0</div>
            <div>FPS</div>
        </div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    
    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Initializing...</span>
    </div>
    
    <div class="debug-log" id="debugLog">🔧 Debug log will appear here...</div>
    
    <div class="mode-select">
        <button class="mode-btn active" data-mode="faces">🎯 Faces</button>
        <button class="mode-btn" data-mode="proxy">⚡ Proxy</button>
        <button class="mode-btn" data-mode="test">🧪 Test Mode</button>
    </div>
    
    <div class="controls">
        <button class="camera" id="switchCameraBtn">🔄 Switch Camera</button>
        <button class="test" id="testDetectionBtn">🔍 Test Detection NOW</button>
        <button id="calibrateBtn" disabled>🎯 Calibrate</button>
        <input type="email" id="email" placeholder="📧 Email for report (optional)">
        <button id="reportBtn" disabled>📊 Save Report</button>
    </div>
    
    <div class="footer">
        Debug Build • Check console for details • v2.2-DEBUG
    </div>

    <script>
        // ============================================
        // DEBUG VERSION - VERBOSE LOGGING
        // ============================================
        
        const $ = id => document.getElementById(id);
        const log = (...args) => {
            const msg = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
            console.log(msg);
            const el = $('debugLog');
            el.textContent = msg + '\n' + el.textContent;
            if (el.textContent.length > 2000) {
                el.textContent = el.textContent.slice(0, 2000);
            }
        };
        
        // State
        const state = {
            video: $('video'),
            canvas: $('canvas'),
            ctx: null,
            debugCanvas: $('debugCanvas'),
            debugCtx: null,
            faceDetection: null,
            mpCamera: null,
            stream: null,
            isProcessing: false,
            lastFrame: 0,
            fps: 0,
            mode: 'faces',
            facesDetected: 0,
            attention: null,
            history: [],
            usingFrontCamera: true, // Start with front for testing
            calibrationOffset: 0
        };
        
        // Config - AGGRESSIVE for testing
        const CONFIG = {
            width: 640,
            height: 480,
            minConfidence: 0.15, // Very low for testing
            maxFaces: 50,
            sampleRate: 1 // Process every frame in debug mode
        };
        
        // ============================================
        // INIT
        // ============================================
        
        async function init() {
            log('🚀 Starting debug build...');
            
            state.ctx = state.canvas.getContext('2d', { alpha: false });
            state.debugCtx = state.debugCanvas.getContext('2d');
            
            // Resize canvases
            const container = document.querySelector('.camera-container');
            state.debugCanvas.width = container.clientWidth;
            state.debugCanvas.height = container.clientHeight;
            state.canvas.width = CONFIG.width;
            state.canvas.height = CONFIG.height;
            
            // Load MediaPipe
            await loadMediaPipe();
            
            // Start camera
            await startCamera();
            
            // Setup buttons
            setupButtons();
            
            log('✅ Initialization complete');
            updateStatus('ready', 'System ready - show your face!');
        }
        
        // ============================================
        // MEDIAPIPE LOADING WITH ERROR HANDLING
        // ============================================
        
        async function loadMediaPipe() {
            log('📦 Loading MediaPipe libraries...');
            updateStatus('loading', 'Downloading AI models...');
            
            try {
                // Check if already loaded
                if (typeof FaceDetection !== 'undefined') {
                    log('✅ FaceDetection already loaded');
                    setupFaceDetection();
                    return;
                }
                
                // Load scripts with timeout
                await Promise.all([
                    loadScriptWithTimeout('https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js', 15000),
                    loadScriptWithTimeout('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js', 15000)
                ]);
                
                log('✅ MediaPipe libraries loaded');
                setupFaceDetection();
                
            } catch (err) {
                log(`❌ MediaPipe load error: ${err.message}`);
                updateStatus('error', 'AI model failed - using test mode');
                // Enable test mode fallback
                state.mode = 'test';
                simulateDetections();
            }
        }
        
        function loadScriptWithTimeout(src, timeout) {
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => {
                    reject(new Error(`Timeout loading ${src}`));
                }, timeout);
                
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => { clearTimeout(timer); resolve(); };
                script.onerror = () => { 
                    clearTimeout(timer); 
                    reject(new Error(`Failed to load ${src}`)); 
                };
                document.head.appendChild(script);
            });
        }
        
        function setupFaceDetection() {
            log('⚙️ Setting up FaceDetection...');
            
            state.faceDetection = new FaceDetection({
                locateFile: file => 
                    `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
            });
            
            state.faceDetection.setOptions({
                model: 'full',
                minDetectionConfidence: CONFIG.minConfidence,
                minTrackingConfidence: CONFIG.minConfidence
            });
            
            state.faceDetection.onResults(onDetectionResults);
            
            log('✅ FaceDetection configured');
        }
        
        // ============================================
        // CAMERA SETUP WITH FALLBACK
        // ============================================
        
        async function startCamera() {
            log(`📷 Requesting ${state.usingFrontCamera ? 'front' : 'rear'} camera...`);
            $('videoOverlay').textContent = 'Requesting camera...';
            
            try {
                const constraints = {
                    video: {
                        facingMode: state.usingFrontCamera ? 'user' : { exact: 'environment' },
                        width: { ideal: CONFIG.width },
                        height: { ideal: CONFIG.height }
                    },
                    audio: false
                };
                
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                state.video.srcObject = state.stream;
                
                await new Promise(resolve => {
                    state.video.onloadedmetadata = resolve;
                });
                await state.video.play();
                
                const track = state.stream.getVideoTracks()[0];
                const settings = track.getSettings();
                
                log(`✅ Camera started: ${settings.width}x${settings.height}, facing: ${settings.facingMode}`);
                $('videoOverlay').textContent = `📹 ${settings.facingMode} • ${settings.width}x${settings.height}`;
                
                // Start MediaPipe camera loop
                if (typeof Camera !== 'undefined') {
                    state.mpCamera = new Camera(state.video, {
                        onFrame: async () => {
                            if (state.faceDetection && !state.isProcessing) {
                                await state.faceDetection.send({ image: state.video });
                            }
                        },
                        width: CONFIG.width,
                        height: CONFIG.height
                    });
                    await state.mpCamera.start();
                    log('🔄 MediaPipe camera loop started');
                }
                
                updateStatus('ready', 'Camera active - show your face!');
                $('calibrateBtn').disabled = false;
                $('reportBtn').disabled = false;
                
            } catch (err) {
                log(`❌ Camera error: ${err.message} (${err.name})`);
                
                // Fallback: try opposite camera
                if (state.usingFrontCamera) {
                    log('🔄 Trying rear camera as fallback...');
                    state.usingFrontCamera = false;
                    $('videoOverlay').textContent = 'Trying rear camera...';
                    setTimeout(() => startCamera(), 500);
                    return;
                }
                
                // Final fallback: simulate
                log('⚠️ No camera available - using simulation mode');
                $('videoOverlay').textContent = '⚠️ No camera - simulation mode';
                simulateDetections();
                updateStatus('warning', 'Using simulation (no camera)');
            }
        }
        
        // ============================================
        // DETECTION HANDLER - WITH DEBUG VISUALS
        // ============================================
        
        function onDetectionResults(results) {
            if (state.isProcessing) return;
            state.isProcessing = true;
            
            const now = performance.now();
            
            // FPS calc
            if (state.lastFrame) {
                state.fps = Math.round(1000 / (now - state.lastFrame));
            }
            state.lastFrame = now;
            
            // Draw to canvas for analysis
            state.ctx.drawImage(state.video, 0, 0, CONFIG.width, CONFIG.height);
            
            // Process detections
            let faces = 0;
            let looking = 0;
            
            if (results.detections && results.detections.length > 0) {
                faces = Math.min(results.detections.length, CONFIG.maxFaces);
                
                // Draw debug boxes
                state.debugCtx.clearRect(0, 0, state.debugCanvas.width, state.debugCanvas.height);
                state.debugCtx.strokeStyle = '#4ade80';
                state.debugCtx.lineWidth = 2;
                state.debugCtx.font = '11px monospace';
                
                results.detections.slice(0, 10).forEach((face, i) => {
                    if (!face.boundingBox) return;
                    
                    const bbox = face.boundingBox;
                    // Convert normalized to pixels
                    const x = bbox.xMin * state.debugCanvas.width;
                    const y = bbox.yMin * state.debugCanvas.height;
                    const w = (bbox.xMax - bbox.xMin) * state.debugCanvas.width;
                    const h = (bbox.yMax - bbox.yMin) * state.debugCanvas.height;
                    
                    // Draw box
                    state.debugCtx.strokeRect(x, y, w, h);
                    
                    // Draw label
                    state.debugCtx.fillStyle = 'rgba(0,0,0,0.7)';
                    state.debugCtx.fillRect(x, y - 18, 60, 16);
                    state.debugCtx.fillStyle = '#4ade80';
                    state.debugCtx.fillText(`Face #${i+1}`, x + 3, y - 7);
                    
                    // Count as "looking" if face is reasonably large (>3% of frame)
                    const faceArea = w * h;
                    const frameArea = state.debugCanvas.width * state.debugCanvas.height;
                    if (faceArea / frameArea > 0.03) {
                        looking++;
                        // Draw green indicator
                        state.debugCtx.fillStyle = 'rgba(74,222,128,0.3)';
                        state.debugCtx.fillRect(x, y, w, h);
                    }
                    
                    log(`🔍 Face #${i+1}: ${Math.round(w)}x${Math.round(h)}px, confidence: ${face.score?.toFixed(2) || 'N/A'}`);
                });
                
                log(`✅ Detected ${faces} faces, ${looking} engaged`);
            } else {
                log('🔍 No faces detected in this frame');
                state.debugCtx.clearRect(0, 0, state.debugCanvas.width, state.debugCanvas.height);
            }
            
            state.facesDetected = faces;
            
            // Calculate attention
            if (faces > 0) {
                const ratio = (looking / faces) * 100;
                state.attention = clamp(ratio + state.calibrationOffset, 10, 98);
            } else {
                state.attention = 25; // Low default when no faces
            }
            
            // Smooth the value
            state.history.push(state.attention);
            if (state.history.length > 30) state.history.shift();
            const smoothed = state.history.reduce((a,b) => a+b, 0) / state.history.length;
            
            // Update UI
            updateUI(smoothed, faces, looking);
            
            state.isProcessing = false;
        }
        
        // ============================================
        // TEST MODE / SIMULATION (for debugging)
        // ============================================
        
        function simulateDetections() {
            log('🧪 Starting simulation mode...');
            
            setInterval(() => {
                // Simulate varying face counts
                const faces = Math.random() > 0.3 ? Math.floor(Math.random() * 5) + 1 : 0;
                const looking = faces > 0 ? Math.floor(Math.random() * faces) : 0;
                
                // Draw fake boxes for visual feedback
                state.debugCtx.clearRect(0, 0, state.debugCanvas.width, state.debugCanvas.height);
                state.debugCtx.strokeStyle = '#4ade80';
                state.debugCtx.lineWidth = 2;
                
                for (let i = 0; i < faces; i++) {
                    const x = 50 + Math.random() * (state.debugCanvas.width - 150);
                    const y = 80 + Math.random() * (state.debugCanvas.height - 200);
                    const w = 60 + Math.random() * 40;
                    const h = 80 + Math.random() * 40;
                    
                    state.debugCtx.strokeRect(x, y, w, h);
                    state.debugCtx.fillStyle = i < looking ? 'rgba(74,222,128,0.2)' : 'rgba(248,113,113,0.2)';
                    state.debugCtx.fillRect(x, y, w, h);
                }
                
                // Calculate attention
                if (faces > 0) {
                    state.attention = clamp((looking / faces) * 100 + 20, 15, 95);
                } else {
                    state.attention = 20 + Math.random() * 15;
                }
                
                state.facesDetected = faces;
                state.history.push(state.attention);
                if (state.history.length > 30) state.history.shift();
                const smoothed = state.history.reduce((a,b) => a+b, 0) / state.history.length;
                
                updateUI(smoothed, faces, looking);
                state.fps = Math.floor(25 + Math.random() * 10);
                
            }, 500);
        }
        
        // ============================================
        // UI UPDATES
        // ============================================
        
        function updateUI(attention, faces, looking) {
            const attEl = $('attention');
            const rounded = Math.round(attention);
            
            attEl.textContent = rounded;
            attEl.className = `attention-value ${
                rounded >= 70 ? 'good' : rounded >= 45 ? 'medium' : 'bad'
            }`;
            
            $('progressFill').style.width = `${rounded}%`;
            $('progressFill').style.background = 
                rounded >= 70 ? '#4ade80' : rounded >= 45 ? '#fbbf24' : '#f87171';
            
            $('faces').textContent = faces;
            $('looking').textContent = looking;
            $('fps').textContent = Math.min(60, state.fps);
        }
        
        function updateStatus(state, message) {
            const dot = $('statusDot');
            const text = $('statusText');
            
            dot.className = `status-dot ${state}`;
            text.textContent = message;
        }
        
        // ============================================
        // BUTTON HANDLERS
        // ============================================
        
        function setupButtons() {
            // Switch camera
            $('switchCameraBtn').onclick = async () => {
                log('🔄 Switching camera request...');
                state.usingFrontCamera = !state.usingFrontCamera;
                
                // Stop current stream
                if (state.stream) {
                    state.stream.getTracks().forEach(t => t.stop());
                }
                if (state.mpCamera) {
                    state.mpCamera.stop();
                }
                
                $('videoOverlay').textContent = 'Switching...';
                await startCamera();
            };
            
            // Manual test trigger
            $('testDetectionBtn').onclick = async () => {
                log('🔍 Manual detection test triggered!');
                $('testDetectionBtn').disabled = true;
                $('testDetectionBtn').textContent = 'Processing...';
                
                // Force a detection cycle
                if (state.faceDetection) {
                    state.ctx.drawImage(state.video, 0, 0, CONFIG.width, CONFIG.height);
                    await state.faceDetection.send({ image: state.video });
                } else {
                    log('⚠️ FaceDetection not ready');
                }
                
                setTimeout(() => {
                    $('testDetectionBtn').disabled = false;
                    $('testDetectionBtn').textContent = '🔍 Test Detection NOW';
                }, 1000);
            };
            
            // Calibrate
            $('calibrateBtn').onclick = () => {
                const current = state.attention || 50;
                if (current < 40) {
                    state.calibrationOffset += 20;
                    log('🎯 Calibration: +20 (low detection)');
                } else if (current > 80) {
                    state.calibrationOffset -= 10;
                    log('🎯 Calibration: -10 (high detection)');
                }
                $('calibrateBtn').textContent = '✅ Calibrated!';
                setTimeout(() => {
                    $('calibrateBtn').textContent = '🎯 Calibrate';
                }, 1500);
            };
            
            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.mode = btn.dataset.mode;
                    log(`🔄 Mode changed to: ${state.mode}`);
                    
                    if (state.mode === 'test') {
                        simulateDetections();
                    }
                };
            });
            
            // Report
            $('reportBtn').onclick = () => {
                const email = $('email').value;
                const avg = state.history.length > 0 
                    ? Math.round(state.history.reduce((a,b)=>a+b,0)/state.history.length) 
                    : 0;
                
                const report = {
                    timestamp: new Date().toISOString(),
                    email: email || null,
                    metrics: {
                        current: Math.round(state.attention),
                        average: avg,
                        faces: state.facesDetected,
                        mode: state.mode
                    },
                    debug: {
                        fps: state.fps,
                        history_samples: state.history.length,
                        calibration: state.calibrationOffset
                    }
                };
                
                const blob = new Blob([JSON.stringify(report, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `speaker_eye_debug_${Date.now()}.json`;
                a.click();
                
                log('📊 Report saved');
            };
        }
        
        // ============================================
        // UTILS
        // ============================================
        
        function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
        
        // Handle page visibility (pause when tab not active)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                log('⏸️ Page hidden - pausing processing');
            } else {
                log('▶️ Page visible - resuming');
            }
        });
        
        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
            }
            if (state.mpCamera) {
                state.mpCamera.stop();
            }
            log('👋 Cleanup complete');
        });
        
        // Start!
        log('📋 Debug build loaded');
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
